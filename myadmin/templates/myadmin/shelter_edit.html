{% extends 'myadmin/demo.html' %}

{% block title %}Edit Shelter{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12 grid-margin stretch-card">
        <div class="card">
            <div class="card-body">
                <h4 class="card-title">Edit Shelter</h4>
                <p class="card-description">
                    Update the shelter details below
                </p>

                <form class="form-horizontal" role="form" action="{% url 'shelter_update' result.shelter_id %}" method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <!-- Shelter Name -->
                    <div class="form-group">
                        <label for="shelter_name">Shelter Name</label>
                        <input type="text"
                               name="shelter_name"
                               class="form-control"
                               id="shelter_name"
                               value="{{ result.shelter_name }}"
                               required>
                    </div>

                    <!-- Price -->
                    <div class="form-group">
                        <label for="price">Price</label>
                        <input type="number"
                               step="0.01"
                               name="price"
                               class="form-control"
                               id="price"
                               value="{{ result.price }}"
                               required>
                    </div>

                    <!-- Contact -->
                    <div class="form-group">
                        <label for="contact">Contact</label>
                        <input type="text"
                               name="contact"
                               class="form-control"
                               id="contact"
                               value="{{ result.contact }}"
                               required>
                    </div>

                    <!-- Capacity -->
                    <div class="form-group">
                        <label for="capacity">Capacity</label>
                        <input type="number"
                               name="capacity"
                               class="form-control"
                               id="capacity"
                               value="{{ result.capacity }}"
                               required>
                    </div>

                    <!-- Available Slot Count -->
                    <div class="form-group">
                        <label for="available_slot_count">Available Slot Count</label>
                        <input type="number"
                               name="available_slot_count"
                               class="form-control"
                               id="available_slot_count"
                               value="{{ result.available_slot_count }}"
                               required>
                    </div>

                    <!-- Address 1 -->
                    <div class="form-group">
                        <label for="address1">Address 1</label>
                        <input type="text"
                               name="address1"
                               class="form-control"
                               id="address1"
                               value="{{ result.address1 }}">
                    </div>

                    <!-- Address 2 -->
                    <div class="form-group">
                        <label for="address2">Address 2</label>
                        <input type="text"
                               name="address2"
                               class="form-control"
                               id="address2"
                               value="{{ result.address2 }}">
                    </div>

                    <!-- Area -->
                    <div class="form-group">
                        <label for="area">Area</label>
                        <input type="text"
                               name="area"
                               class="form-control"
                               id="area"
                               value="{{ result.area }}">
                    </div>

                    <!-- City -->
                    <div class="form-group">
                        <label for="city">City</label>
                        <input type="text"
                               name="city"
                               class="form-control"
                               id="city"
                               value="{{ result.city }}">
                    </div>

                    <!-- Landmark -->
                    <div class="form-group">
                        <label for="landmark">Landmark</label>
                        <input type="text"
                               name="landmark"
                               class="form-control"
                               id="landmark"
                               value="{{ result.landmark }}">
                    </div>

                    <!-- Pincode -->
                    <div class="form-group">
                        <label for="pincode">Pincode</label>
                        <input type="text"
                               name="pincode"
                               class="form-control"
                               id="pincode"
                               value="{{ result.pincode }}">
                    </div>

                    <!-- Buttons -->
                    <button type="submit" class="btn btn-primary mr-2">
                        Update
                    </button>
                    <a href="/myadmin/view_shelter" class="btn btn-light">
                        Cancel
                    </a>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
