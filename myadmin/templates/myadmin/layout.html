{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Admin Panel{% endblock %}</title>

  <!-- CSS -->
  <link rel="stylesheet" href="{% static 'myadmin/vendors/css/vendor.bundle.base.css' %}">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
<div class="container-scroller">

  <!-- ================= SIDEBAR ================= -->
  <nav class="sidebar sidebar-offcanvas" id="sidebar">
    <div class="sidebar-brand-wrapper d-flex align-items-center justify-content-center">
      <a class="sidebar-brand brand-logo text-white fw-bold" href="#">Regal</a>
    </div>

    <ul class="nav">
      <li class="nav-item nav-profile">
        <a href="#" class="nav-link">
          <div class="nav-profile-image">
            <img src="{% static 'myadmin/images/faces/face1.jpg' %}" alt="profile">
          </div>
          <div class="nav-profile-text">
            <span class="font-weight-bold">Edward Spencer</span>
            <span class="text-secondary text-small">Developer</span>
          </div>
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="#">
          <span class="menu-title">Dashboard</span>
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="#">
          <span class="menu-title">Products</span>
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="#">
          <span class="menu-title">Users</span>
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="#">
          <span class="menu-title">Shelters</span>
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="#">
          <span class="menu-title">Feedbacks</span>
        </a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="#">
          <span class="menu-title">Payments</span>
        </a>
      </li>
    </ul>
  </nav>
  <!-- ================= END SIDEBAR ================= -->

  <div class="container-fluid page-body-wrapper">

    <!-- ================= NAVBAR ================= -->
    <nav class="navbar p-0 fixed-top d-flex flex-row">
      <div class="navbar-menu-wrapper d-flex align-items-center justify-content-between w-100">
        <button class="navbar-toggler navbar-toggler align-self-center" type="button">
          ☰
        </button>

        <!-- <div class="search-field d-none d-md-block">
          <input type="text" class="form-control" placeholder="Search Projects...">
        </div>
 -->
        <div class="d-flex align-items-center">
          <button class="btn btn-primary btn-sm">+ Create New</button>
        </div>
      </div>
    </nav>
    <!-- ================= END NAVBAR ================= -->

    <!-- ================= MAIN PANEL ================= -->
    <div class="main-panel">
      <div class="content-wrapper">

        {% block content %}
        <!-- Page content here -->
        {% endblock %}

      </div>
    </div>
    <!-- ================= END MAIN PANEL ================= -->

  </div>
</div>

<!-- JS -->
<script src="{% static 'myadmin/vendors/js/vendor.bundle.base.js' %}"></script>
<script src="{% static 'myadmin/js/off-canvas.js' %}"></script>
<script src="{% static 'myadmin/js/template.js' %}"></script>

</body>
</html>
