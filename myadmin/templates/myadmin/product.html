v{% extends 'myadmin/demo.html' %}

{% block title %}Add Product{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12 grid-margin stretch-card">
        <div class="card">
            <div class="card-body">
                <h4 class="card-title">Add Product</h4>
                <p class="card-description">
                    Fill in the product details below
                </p>
                <form class="forms-sample" method="POST" action="/myadmin/add_product" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="form-group">
                        <label for="product_name">Product Name</label>
                        <input type="text" name="product_name" class="form-control" id="product_name" placeholder="Product Name" required>
                    </div>

                    <div class="form-group">
                        <label for="category">Category</label>
                        <input type="text" name="category" class="form-control" id="category" placeholder="Category" required>
                    </div>

                    <div class="form-group">
                        <label for="price">Price</label>
                        <input type="number" step="0.01" name="price" class="form-control" id="price" placeholder="Price" required>
                    </div>

                    <div class="form-group">
                        <label for="age_range">Age Range</label>
                        <input type="text" name="age_range" class="form-control" id="age_range" placeholder="Age Range">
                    </div>

                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea class="form-control" name="description" id="description" rows="4" placeholder="Product Description"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="product_image">Product Image</label>
                        <input type="file" name="product_image" class="form-control" id="product_image">
                    </div>

                    <button type="submit" class="btn btn-primary mr-2">Submit</button>
                    <button type="reset" class="btn btn-light">Cancel</button>
                </form>
            </div>
        </div>
    </div>
</div>


{% endblock %}
