{% extends 'myadmin/demo.html' %}

{% block title %}Edit Product{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12 grid-margin stretch-card">
        <div class="card">
            <div class="card-body">
                <h4 class="card-title">Edit Product</h4>
                <p class="card-description">
                    Update the product details below
                </p>

               
        <form class="form-horizontal" role="form" action="{% url 'product_update' result.product_id %}" method="POST" enctype="multipart/form-data">


                    {% csrf_token %}

                    <!-- Product Name -->
                    <div class="form-group">
                        <label for="product_name">Product Name</label>
                        <input type="text"
                               name="product_name"
                               class="form-control"
                               id="product_name"
                               value="{{ result.product_name }}"
                               required>
                    </div>

                    <!-- Category -->
                    <div class="form-group">
                        <label for="category">Category</label>
                        <input type="text"
                               name="category"
                               class="form-control"
                               id="category"
                               value="{{ result.category }}"
                               required>
                    </div>

                    <!-- Price -->
                    <div class="form-group">
                        <label for="price">Price</label>
                        <input type="number"
                               step="0.01"
                               name="price"
                               class="form-control"
                               id="price"
                               value="{{ result.price }}"
                               required>
                    </div>

                    <!-- Age Range -->
                    <div class="form-group">
                        <label for="age_range">Age Range</label>
                        <input type="text"
                               name="age_range"
                               class="form-control"
                               id="age_range"
                               value="{{ result.age_range }}">
                    </div>

                    <!-- Description -->
                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea class="form-control"
                                  name="description"
                                  id="description"
                                  rows="4">{{ result.description }}</textarea>
                    </div>

                    <!-- Current Image -->
                    {% if result.product_image %}
                    <div class="form-group">
                        <label>Current Image</label><br>
                        <img src="{{ result.product_image.url }}"
                             alt="Product Image"
                             style="height:120px; border-radius:6px;">
                    </div>
                    {% endif %}

                    <!-- Update Image -->
                    <div class="form-group">
                        <label for="product_image">Change Product Image</label>
                        <input type="file"
                               name="product_image"
                               class="form-control"
                               id="product_image">
                        <small class="text-muted">
                            Leave empty to keep existing image
                        </small>
                    </div>

                    <!-- Buttons -->
                    <button type="submit" class="btn btn-primary mr-2">
                        Update
                    </button>
                    <a href="/myadmin/view_product" class="btn btn-light">
                        Cancel
                    </a>

                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
