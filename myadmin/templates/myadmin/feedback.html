

{% extends 'myadmin/demo.html' %}

{% block title %}Payments{% endblock %}

{% block content %}
<div class="row">
  <div class="col-lg-12 grid-margin stretch-card">
    <div class="card">
      <div class="card-body">

        <h4 class="card-title">Feedbacks Table</h4>
        <!-- <p class="card-description"><code>Payments</code></p> -->

        <div class="table-responsive">
          <table class="table table-striped">
            <thead>
              <tr>
                 <th>User</th>
                          <th>Ratings</th>
                          <th>Comments</th>

              </tr>
            </thead>
            <tbody>
              {% for f in feedbacks %}
              <tr>
  <td>{{ f.user.full_name }}</td>
  <td>{{ f.ratings }}</td>
        <td>{{ f.comments }}</td>
</tr>
              {% empty %}

            
              <tr>
                <td colspan="6" class="text-center">No Payments found</td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>

      </div>
    </div>
  </div>
</div>
{% endblock %}
