{% extends 'myadmin/demo.html' %}

{% block title %}Add Shelter{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12 grid-margin stretch-card">
        <div class="card">
            <div class="card-body">
                <h4 class="card-title">Add Shelter</h4>
                <p class="card-description">
                    Fill in the shelter details below
                </p>

                <form class="forms-sample" method="POST" action="/myadmin/add_shelter">
                    {% csrf_token %}

                    <!-- Shelter Name -->
                    <div class="form-group">
                        <label for="shelter_name">Shelter Name</label>
                        <input type="text" name="shelter_name" class="form-control" id="shelter_name" placeholder="Shelter Name" required>
                    </div>

                    <!-- Address Line 1 -->
                    <div class="form-group">
                        <label for="address1">Address Line 1</label>
                        <input type="text" name="address1" class="form-control" id="address1" placeholder="House No, Building Name" required>
                    </div>

                    <!-- Address Line 2 -->
                    <div class="form-group">
                        <label for="address2">Address Line 2</label>
                        <input type="text" name="address2" class="form-control" id="address2" placeholder="Street / Road Name">
                    </div>

                    <!-- Landmark -->
                    <div class="form-group">
                        <label for="landmark">Landmark</label>
                        <input type="text" name="landmark" class="form-control" id="landmark" placeholder="Nearby Landmark">
                    </div>

                    <!-- Area -->
                    <div class="form-group">
                        <label for="area">Area</label>
                        <input type="text" name="area" class="form-control" id="area" placeholder="Area / Locality" required>
                    </div>

                    <!-- City -->
                    <div class="form-group">
                        <label for="city">City</label>
                        <input type="text" name="city" class="form-control" id="city" placeholder="City" required>
                    </div>

                    <!-- Pincode -->
                    <div class="form-group">
                        <label for="pincode">Pincode</label>
                        <input type="number" name="pincode" class="form-control" id="pincode" placeholder="Pincode" required>
                    </div>

                    <!-- Price -->
                    <div class="form-group">
                        <label for="price">Price</label>
                        <input type="number" step="0.01" name="price" class="form-control" id="price" placeholder="Price" required>
                    </div>

                    <!-- Contact -->
                    <div class="form-group">
                        <label for="contact">Contact Number</label>
                        <input type="number" name="contact" class="form-control" id="contact" placeholder="Contact Number" required>
                    </div>

                    <!-- Capacity -->
                    <div class="form-group">
                        <label for="capacity">Total Capacity</label>
                        <input type="number" name="capacity" class="form-control" id="capacity" placeholder="Total Capacity" required>
                    </div>

                    <!-- Available Slots -->
                    <div class="form-group">
                        <label for="available_slot_count">Available Slots</label>
                        <input type="number" name="available_slot_count" class="form-control" id="available_slot_count" placeholder="Available Slots" required>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="btn btn-primary mr-2">Submit</button>
                    <button type="reset" class="btn btn-light">Cancel</button>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
